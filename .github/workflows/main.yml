name: Aternos Automation Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:        

jobs:
  run-bot:
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Aternos Bot
        run: node aternos_launcher.js
        env:
          
          ATERNOS_USER: ${{ secrets.ATERNOS_USER }}
          ATERNOS_PASS: ${{ secrets.ATERNOS_PASS }}
